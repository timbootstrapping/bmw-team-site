<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download &middot; HTmB 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #14213D;
    --navy-soft: #2C3E5E;
    --bg: #F5F6F8;
    --card: #FFFFFF;
    --border: #E4E7EC;
    --muted: #667085;
    --accent: #1C69D4;
    --accent-soft: #EAF1FC;
  }

  *{ box-sizing: border-box; }

  html{ -webkit-text-size-adjust: 100%; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  main{
    max-width: 560px;
    margin: 0 auto;
    padding: 56px 24px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header{
    text-align: center;
    margin-bottom: 40px;
  }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 3.1rem);
    letter-spacing: 0.02em;
    margin: 0 0 14px;
  }

  .bar{
    width: 64px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0 auto 22px;
  }

  header p{
    color: var(--muted);
    font-size: 1.02rem;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.55;
  }

  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .doc-icon{
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .doc-icon svg{ width: 30px; height: 30px; fill: var(--accent); }

  .doc-title{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    margin: 0 0 6px;
  }

  .doc-sub{
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.5;
    margin: 0 0 26px;
  }

  .btn{
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 26px;
    border-radius: 999px;
    transition: background 0.15s ease;
  }

  .btn:hover{ background: #16559f; }

  .btn svg{ width: 17px; height: 17px; fill: currentColor; flex-shrink: 0; }

  .back{
    display: inline-block;
    margin: 28px auto 0;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 500;
  }

  .back:hover{ color: var(--accent); }

  footer{
    text-align: center;
    margin-top: auto;
    padding-top: 48px;
    color: var(--muted);
    font-size: 0.8rem;
  }

  @media (max-width: 480px){
    main{ padding: 40px 16px 64px; }
    .card{ padding: 30px 20px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>PR&Auml;SENTATION</h1>
    <div class="bar"></div>
    <p>Lade dir die Folien zu unserem Projekt als PDF herunter.</p>
  </header>

  <div class="card">
    <div class="doc-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm-1 7V3.5L18.5 9zM8 13h8v1.5H8zm0 3.5h8V18H8zm0-7h3V11H8z"/></svg>
    </div>
    <div class="doc-title">HTmB 2026 &ndash; Pr&auml;sentation</div>
    <div class="doc-sub">Humanoide Robotik bei BMW</div>
    <a class="btn" href="downloads/praesentation.pdf" download>
      <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3zM5 18h14v2H5z"/></svg>
      PDF herunterladen
    </a>
  </div>

  <a class="back" href="index.html">&larr; Zur&uuml;ck zum Team</a>

  <footer> Hochschule Landshut × BMW | 2026</footer>
</main>
</body>
</html>
